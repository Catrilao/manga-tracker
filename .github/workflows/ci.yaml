name: CI / Code Quality

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yaml"
      - ".github/workflows/dependabot-uv-lock.yaml"
      - "flake.nix"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "flake.nix"

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: determinatesystems/nix-installer-action@22

      - name: Magic Nix Cache
        uses: determinatesystems/magic-nix-cache-action@14

      - name: Cache uv
        uses: actions/cache@5
        with:
          path: ~/.cache/uv
          key: ${{ github.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ github.os }}-uv-

      - name: Run Linters and Formatting Check
        run: |
          nix develop .#default --command ruff format --check .
          nix develop .#default --command ruff check .

      - name: Run Static Type Checking (MyPy)
        run: nix develop .#default --command mypy src

      - name: Run Full Test Suite
        run: nix develop .#default --command pytest
        env:
          TRACKER_ENV: test
          DATABASE_URL: postgresql://mock:mock@localhost:5432/mock
          DISCORD_WEBHOOK: https://discord.com/api/webhooks/mock/mock
