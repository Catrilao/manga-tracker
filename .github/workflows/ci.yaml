name: CI / Code Quality

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yaml"
      - ".github/workflows/dependabot-uv-lock.yaml"
      - "flake.nix"
      - "flake.lock"

  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "flake.nix"
      - "flake.lock"

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Nix
        uses: determinatesystems/nix-installer-action@v22

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ github.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ github.os }}-uv-

      - name: Run CI
        run: nix develop .#ci --command bash -lc "
          uv sync &&
          uv run ruff check . &&
          uv run ruff format --check &&
          uv run mypy src &&
          uv run pytest -n auto
          "
        env:
          TRACKER_ENV: test
          DATABASE_URL: postgresql://mock:mock@localhost:5432/mock
          DISCORD_WEBHOOK: https://discord.com/api/webhooks/mock/mock
