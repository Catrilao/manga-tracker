name: CI / Code Quality

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yaml"
      - ".github/workflows/sync-uv-lock.yaml"
      - "flake.nix"
      - "flake.lock"

  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - "flake.nix"
      - "flake.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TRACKER_ENV: test
      DATABASE_URL: postgresql://mock:mock@localhost:5432/mock
      DISCORD_WEBHOOK: https://discord.com/api/webhooks/mock/mock

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Nix
        uses: determinatesystems/nix-installer-action@v22

      - name: Magic Nix Cache
        uses: determinatesystems/magic-nix-cache-action@v14

      - name: Cache uv
        uses: actions/cache@v6
        with:
          path: ~/.cache/uv
          key: ${{ github.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ github.os }}-uv-

      - name: Lint
        run: |
          nix develop .#ci --command \
          uv run pre-commit run --all-files

      - name: Test
        if: "!cancelled()"
        run: |
          nix develop .#ci --command \
          uv run pytest -n logical
