name: Auto sync uv.lock

on:
  pull_request:
    paths:
      - "pyproject.toml"

permissions:
  contents: write

jobs:
  update_lockfile:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' || startsWith(github.head_ref, 'release-please--branches--')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.RELEASE_BOT_PAT }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Regenerate uv.lock
        run: uv lock

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(deps): update uv.lock"
          file_pattern: "uv.lock"
