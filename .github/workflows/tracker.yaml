name: Manga Tracker

on:
    schedule:
        - cron: "36 18 */5 * *"
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check-manga:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Set up Python
              run: uv python install 3.12

            - name: Install dependencies
              run: uv sync --frozen

            - name: Install Playwright Chromium
              run: uv run playwright install chromium --with-deps

            - name: Get GitHub Runner IP
              id: ip
              uses: haythem/public-ip@v1.3

            - name: Whitelist IP in Supabase
              env:
                  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
                  PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
              run: |
                  # 1. Obtener la lista actual de IPs permitidas
                  RESPONSE=$(curl -s --fail-with-body "https://api.supabase.com/v1/projects/$PROJECT_ID/network-restrictions" \
                      -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN")

                  # 2. Extraer el array usando jq (si es null, devuelve un array vacío)
                  OLD_CIDRS=$(echo "$RESPONSE" | jq -c '.config.dbAllowedCidrs // .dbAllowedCidrs // []')

                  # 3. Guardar la lista original en el entorno de GitHub para el paso final
                  echo "OLD_CIDRS=$OLD_CIDRS" >> $GITHUB_ENV

                  # 4. Agregar la IP del runner al array existente y eliminar duplicados
                  NEW_CIDRS=$(echo "$OLD_CIDRS" | jq -c ". + [\"$RUNNER_IP\"] | unique")

                  # 5. Enviar la lista actualizada a Supabase
                  curl -s --fail-with-body -X POST "https://api.supabase.com/v1/projects/$PROJECT_ID/network-restrictions" \
                      -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
                      -H "Content-Type: application/json" \
                      -d "{\"dbAllowedCidrs\": $NEW_CIDRS}"

            - name: Run tracker
              env:
                  DB_USER: ${{ secrets.DB_USER }}
                  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
                  DB_HOST: ${{ secrets.DB_HOST }}
                  DB_PORT: ${{ secrets.DB_PORT }}
                  DB_NAME: ${{ secrets.DB_NAME }}
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
                  GITHUB_RUN_ID: ${{ github.run_id }}
                  GIT_COMMIT: ${{ github.sha }}
              run: uv run manga-tracker

            - name: Revoke IP from Supabase (Lock the Door)
              if: always()
              env:
                  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
                  PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
              run: |
                  # Verificación de seguridad: si OLD_CIDRS está vacío, el paso inicial falló.
                  # Abortamos la restauración para no borrar la configuración accidentalmente.
                  if [ -z "$OLD_CIDRS" ]; then
                    echo "No original CIDRs found in environment. Skipping restore to prevent data loss."
                    exit 0
                  fi

                  curl -s --fail-with-body -X POST "https://api.supabase.com/v1/projects/$PROJECT_ID/network-restrictions" \
                    -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "{\"dbAllowedCidrs\": $OLD_CIDRS}"

            - name: Notify on failure
              if: failure()
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
                  RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              run: |
                  curl -H "Content-Type: application/json" \
                       -d '{
                           "embeds": [{
                               "title": "💀 Critical Failure on Github Actions 💀",
                               "description": "The workflow failed before completing the script.\n\n[Logs]('"$RUN_URL"')",
                               "color": 16711680
                           }]
                       }' "$DISCORD_WEBHOOK"
