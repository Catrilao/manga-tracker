name: Manga Tracker

on:
    schedule:
        - cron: "36 18 */5 * *"
    workflow_dispatch:

jobs:
    check-manga:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: true

            - name: Set up Python
              run: uv python install 3.12

            - name: Install dependencies
              run: uv sync --frozen

            - name: Install Playwright Chromium
              run: uv run playwright install chromium --with-deps

            - name: Run tracker
              env:
                  user: ${{ secrets.user }}
                  password: ${{ secrets.password }}
                  host: ${{ secrets.host }}
                  port: ${{ secrets.port }}
                  dbname: ${{ secrets.dbname }}
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
              run: uv run main.py

            - name: Notify on failure
              if: failure()
              env:
                  DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
              run: |
                  curl -H "Content-Type: application/json" \
                      -d '{
                          "embeds": [{
                              "title": "💀 Critical Failure on Github Actions 💀",
                              "description": "The workflow failed before completing the script. See logs on GitHub",
                              "color": 16711680,
                              }]
                      }' "$DISCORD_WEBHOOK"
