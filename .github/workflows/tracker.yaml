name: Manga Tracker

on:
  schedule:
    - cron: "36 18 */5 * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-manga:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Nix
        uses: determinatesystems/nix-installer-action@v22

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ github.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ github.os }}-uv-

      - name: Get GitHub Runner IP
        id: ip
        uses: haythem/public-ip@v1.3

      - name: Whitelist IP in Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          RUNNER_IP: ${{ steps.ip.outputs.ipv4 }}/32
        run: |
          curl -s --fail-with-body -X PATCH "https://api.supabase.com/v1/projects/$PROJECT_ID/network-restrictions" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"add\": {\"dbAllowedCidrs\": [\"$RUNNER_IP\"]}}"

          sleep 20

      - name: Run tracker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          nix develop .#ci --command bash -lc "
            uv sync &&
            uv run manga-tracker
          "

      - name: Revoke IP from Supabase (Lock the Door)
        if: always()
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          RUNNER_IP: ${{ steps.ip.outputs.ipv4 }}/32
        run: |
          curl -s --fail-with-body -X PATCH "https://api.supabase.com/v1/projects/$PROJECT_ID/network-restrictions" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"remove\": {\"dbAllowedCidrs\": [\"$RUNNER_IP\"]}}"

      - name: Notify on failure
        if: failure() || cancelled()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          curl -sS --fail-with-body --retry 3 \
               -H "Content-Type: application/json" \
               -d '{
                   "embeds": [{
                       "title": "💀 Critical Failure on Github Actions 💀",
                       "description": "The workflow failed before completing the script.\n\n[Logs](${{ env.RUN_URL }})",
                       "color": 16711680
                   }]
               }' "$DISCORD_WEBHOOK"
