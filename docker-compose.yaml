services:
  db:
    image: postgres:16-alpine
    container_name: manga_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tracker_dev
      POSTGRES_PASSWORD: local_password
      POSTGRES_DB: manga_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/infrastructure/database/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker_dev -d manga_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: manga_tracker_pg_data
